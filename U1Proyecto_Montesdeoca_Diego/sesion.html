<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión — ChullaCine</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" href="images/gafas-3d.png" type="image/x-icon">
</head>

<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="index.html">ChullaCine</a>
      <nav>
        <ul class="nav-list">
          <li><a href="index.html">Inicio</a></li>
          <li><a href="services.html">Cartelera</a></li>
          <li><a href="showtime.html">Funciones</a></li>
          <li><a href="offers.html">Ofertas</a></li>
          <li><a href="about.html">Acerca</a></li>
          <li><a href="contact.html">Contacto</a></li>
        </ul>
      </nav>
      <form action="index.html" method="get">
        <div class="header-actions">
          <label for="search"><button class="button small" type="submit">Enviar</button></label>
          <input class="search" type="search" placeholder="Ingrese que quiere buscar..." id="buscar" name="buscar">
          <a class="button small" href="sesion.html">Iniciar sesión</a>
        </div>
      </form>
  </header>

  <main class="container"
    style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 70vh; padding: 20px 0;">

    <div class="card" style="width: 100%; max-width: 400px; padding: 30px;">
      <h2 style="margin-top: 0; text-align: center; margin-bottom: 24px;">Iniciar Sesión</h2>

      <form action="index.html" method="get" style="display: flex; flex-direction: column; gap: 16px;">

        <div>
          <label for="usuario">Usuario o Correo Electrónico</label>
          <input type="text" id="usuario" name="usuario" placeholder="Ej: usuario123" required>
        </div>

        <div>
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" placeholder="••••••••" maxlength="16"
            pattern="^(?=.*[!@#$%^&*(),.?&quot;:{}|<>])[A-Za-z0-9!@#$%^&*(),.?&quot;:{}|<>]{6,16}$"
            title="La contraseña debe tener entre 6 y 16 caracteres e incluir al menos un carácter especial (Ej: @, $, !, %, *, ?, &)"
            required>
          <small class="muted" style="display: block; margin-top: 4px; font-size: 0.75rem;">
            Entre 6 y 16 caracteres. Debe incluir un carácter especial.
          </small>
        </div>

        <button class="button" type="submit" style="width: 100%; margin-top: 10px; padding: 12px;">
          Ingresar
        </button>
      </form>

      <p class="muted" style="text-align: center; margin-top: 20px; font-size: 0.9rem;">
        ¿No tienes cuenta? <a href="registro.html" style="color: var(--accent); text-decoration: none;">Regístrate
          aquí</a>
      </p>
    </div>

  </main>

  <footer>
    <div class="container">© 2026 ChullaCine</div>
  </footer>
</body>

</html>
